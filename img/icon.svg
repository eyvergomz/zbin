<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 38" width="38" height="38">
  <!-- Hexagon with keyhole - zbin logo -->
  <g transform="translate(19, 19)">
    <!-- Hexagon background -->
    <polygon points="0,-17 14.7,-8.5 14.7,8.5 0,17 -14.7,8.5 -14.7,-8.5"
      fill="#f0f1f5" stroke="#2d2d2d" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Keyhole circle -->
    <circle cx="0" cy="-3" r="3.5" fill="none" stroke="#2d2d2d" stroke-width="1.8"/>
    <!-- Keyhole bottom -->
    <path d="M-2,0 L-2.5,8 L2.5,8 L2,0" fill="none" stroke="#2d2d2d" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
